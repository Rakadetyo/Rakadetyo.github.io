    <!-- ===== About ===== -->
    <section class="about" id="about">
      <div class="about__header">
        <h1 class="about__title">{{name}}</h1>
        <p class="about__subtitle">{{title}}</p>
        <p class="about__contact">
          <a href="{{phone_url}}" target="_blank">{{phone_label}}</a> &middot;
          <a href="{{email_url}}" target="_blank">{{email_label}}</a>
        </p>
      </div>

      <p class="about__bio">
        {{bio}}
      </p>

      <ul class="about__links">
{{links}}
        <li><a href="#" onclick="window.print();return false;">Save as PDF</a></li>
      </ul>
    </section>
